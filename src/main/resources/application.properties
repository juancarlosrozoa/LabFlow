# Application
spring.application.name=LabFlow

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/labflow
spring.datasource.username=labflow
spring.datasource.password=labflow123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=labflow-super-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# CORS
cors.allowed-origins=http://localhost:5173

# Server
server.port=${PORT:8080}
